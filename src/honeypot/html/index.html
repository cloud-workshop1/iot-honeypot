<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS-2CD2183G2 - Network Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #e94560;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .logo p {
            color: #a0a0a0;
            font-size: 12px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #a0a0a0;
            font-size: 12px;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 3px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #e94560; }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .login-btn:hover { background: #c73652; }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>HIKVISION</h1>
            <p>DS-2CD2183G2 Network Camera</p>
            <p style="color:#666; font-size:10px; margin-top:4px;">V5.7.16 build 230228</p>
        </div>
        <form action="/doc/page/login.asp" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
        <div class="footer">
            © Hikvision Digital Technology Co., Ltd.
        </div>
    </div>
</body>
</html>
