# nginx-iot.conf
# Deploy to: /opt/honeypot/nginx-iot.conf
#
# CRITICAL: Server header must read "App-webs/2.0" to fingerprint as
# Hikvision DS-2CD2183G2. Any other value reveals the honeypot to scanners.
# Verify with: curl -sI http://YOUR_ORACLE_IP/ | grep Server

events {
    worker_connections 1024;
}

http {
    # Remove nginx version from all responses
    server_tokens off;

    server {
        listen 80;
        listen [::]:80;

        root /usr/share/nginx/html;
        index index.html;

        # Hikvision fingerprint — MUST match DS-2CD2183G2 exactly
        add_header Server "App-webs/2.0" always;

        # Do NOT add: X-Powered-By, Via, X-Forwarded-For, CDN headers
        # These would reveal non-embedded server to scanners

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Mimic Hikvision login endpoint path
        location /doc/page/login.asp {
            try_files /index.html =200;
        }

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;
    }
}
