# zt-forensics.yaml
# Deploy to: /opt/tetragon/policies/zt-forensics.yaml
#
# Tetragon TracingPolicy — ZTA violation forensic capture for ZeroTrace paper.
#
# Fix from Plan.pdf: each kprobe is a separate list entry under `kprobes:`
# The Plan.pdf version incorrectly nested execve/memfd_create/ptrace inside
# tcp_connect's selectors block, which is invalid Tetragon YAML.

apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: iot-zt-forensics
spec:
  kprobes:

    # --- Gap 2: Lateral movement detection ---
    # Capture ALL TCP connection attempts.
    # ZTA violation: firmware-updater (172.20.0.12) reached from MQTT namespace.
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
      selectors:
        - matchBinaries:
          - operator: NotIn
            values: ["/usr/sbin/mosquitto"]   # Exclude legitimate broker connections

    # --- Binary execution from world-writable directories ---
    # Detects: attacker drop-and-execute pattern (/tmp, /dev/shm, /var/tmp)
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
        - index: 1
          type: "string_array"
      selectors:
        - matchArgs:
          - index: 0
            operator: Prefix
            values:
              - "/tmp/"
              - "/dev/shm/"
              - "/var/tmp/"

    # --- Fileless malware staging ---
    # sys_memfd_create: canonical IoT malware pattern (Mirai ARM variants).
    # Every call is suspicious in this environment — no legitimate use case.
    - call: "sys_memfd_create"
      syscall: true
      args:
        - index: 0
          type: "string"

    # --- Process injection ---
    # sys_ptrace with PTRACE_POKEDATA (arg0 == 4).
    # Triggers immediate PANDA memory acquisition via session_correlator.py.
    - call: "sys_ptrace"
      syscall: true
      args:
        - index: 0
          type: "int"
      selectors:
        - matchArgs:
          - index: 0
            operator: Equal
            values: ["4"]   # PTRACE_POKEDATA = 4
