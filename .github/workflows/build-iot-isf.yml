# build-iot-isf.yml
# Deploy to: .github/workflows/build-iot-isf.yml in the GitHub repo
#
# Triggered on every push to firmware/** or kernel-config/**
# Builds ARM Linux kernel with DWARF4 debug symbols,
# extracts Volatility 3 ISF, uploads as GitHub Release artifact.
# Runs free on GitHub Education (ubuntu-latest hosted runner).

name: Build IoT ARM Firmware + Generate Volatility ISF

on:
  push:
    paths:
      - 'firmware/**'
      - 'kernel-config/**'
  workflow_dispatch:   # Allow manual trigger

jobs:
  build-and-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM cross-compiler + DWARF tools + dwarf2json
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf \
            libelf-dev dwarfdump pahole \
            python3-pip
          pip3 install volatility3==2.27.0
          # Install Go 1.22 from official tarball (apt golang-go is v1.18 — too old for dwarf2json)
          wget -q https://go.dev/dl/go1.22.5.linux-amd64.tar.gz -O /tmp/go.tar.gz
          sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          export PATH=$PATH:/usr/local/go/bin
          # dwarf2json: converts vmlinux DWARF debug info → Volatility 3 ISF JSON
          go install github.com/volatilityfoundation/dwarf2json@latest

      - name: Download ARM kernel source (if not in repo)
        run: |
          if [ ! -d "linux-5.15.162" ]; then
            wget -q https://cdn.kernel.org/pub/linux/kernel/v5.x/linux-5.15.162.tar.xz
            tar -xf linux-5.15.162.tar.xz
          fi

      - name: Configure ARM kernel with DWARF4 debug symbols
        run: |
          cd linux-5.15.162
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- vexpress_defconfig
          ./scripts/config \
            --enable CONFIG_DEBUG_INFO \
            --enable CONFIG_DEBUG_INFO_DWARF4 \
            --disable CONFIG_DEBUG_INFO_REDUCED \
            --enable CONFIG_KALLSYMS \
            --enable CONFIG_KALLSYMS_ALL \
            --enable CONFIG_FRAME_POINTER
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- olddefconfig

      - name: Build kernel (vmlinux contains DWARF symbols)
        run: |
          cd linux-5.15.162
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j4 zImage
          echo "vmlinux size: $(du -sh vmlinux)"

      - name: Extract DWARF symbols → Volatility 3 ISF + Validate
        run: |
          set -euo pipefail
          export PATH=$PATH:/usr/local/go/bin
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          ISF="/tmp/iot-arm-linux-${COMMIT}.json"

          # Verify dwarf2json binary exists
          ls -la ~/go/bin/dwarf2json

          # Run dwarf2json — outputs ISF JSON to stdout
          ~/go/bin/dwarf2json linux --elf linux-5.15.162/vmlinux > "${ISF}"

          # Check file is non-empty
          SIZE=$(wc -c < "${ISF}")
          echo "ISF size: ${SIZE} bytes"
          if [ "${SIZE}" -lt 1000 ]; then
            echo "ERROR: ISF file too small (${SIZE} bytes) — dwarf2json likely failed"
            cat "${ISF}"
            exit 1
          fi

          echo "ISF_FILE=${ISF}" >> $GITHUB_ENV
          echo "COMMIT=${COMMIT}" >> $GITHUB_ENV

          # Validate in same step (avoids /tmp cross-step isolation issues)
          python3 - << PYEOF
          import json, sys
          with open("${ISF}") as f:
              isf = json.load(f)
          assert "task_struct" in isf["user_types"], "FAIL: task_struct missing from ISF"
          assert "mm_struct"   in isf["user_types"], "FAIL: mm_struct missing from ISF"
          print(f"PASS: ISF validated — {len(isf['user_types'])} user types found")
          PYEOF

      - name: Upload ISF as workflow artifact (retained 90 days)
        uses: actions/upload-artifact@v4
        with:
          name: volatility-isf-${{ github.sha }}
          path: /tmp/iot-arm-linux-*.json
          retention-days: 90

      - name: Tag ISF as GitHub Release asset (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/iot-arm-linux-*.json
