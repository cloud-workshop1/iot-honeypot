# server.conf
# Deploy to: /opt/spire/conf/server.conf
#
# Fix from Plan.pdf: trust_domain standardized to "iot-honeypot.local"
# (Plan.pdf inconsistently used "zot-honeypot.local" in some sections)
# Updated to use SPIRE v1.14.1 syntax.

server {
  bind_address = "127.0.0.1"
  bind_port    = "8081"
  trust_domain = "iot-honeypot.local"
  data_dir     = "/opt/spire/data/server"
  socket_path  = "/opt/spire/sockets/server.sock"
  log_level    = "INFO"

  ca_subject {
    country      = ["US"]
    organization = ["IoT Honeypot Research"]
    common_name  = ""
  }
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type     = "sqlite3"
      connection_string = "/opt/spire/data/server/datastore.sqlite3"
    }
  }

  NodeAttestor "join_token" {
    plugin_data {}
  }

  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/data/server/keys.json"
    }
  }
}
