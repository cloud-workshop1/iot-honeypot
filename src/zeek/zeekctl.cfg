# zeekctl.cfg — Zeek control configuration
# Deploy to: /etc/zeek/zeekctl.cfg on Oracle ARM64 host
#
# 5-minute log rotation synchronized with pcap_capture.sh ring buffer.
# All output goes to /forensics/zeek for MinIO WORM ingestion.

[zeekctl]

# Log directory — forensics volume (separate 90GB block device)
LogDir = /forensics/zeek

# Rotate logs every 300 seconds (5 minutes) to match pcap ring buffer
LogRotationInterval = 300

# Compress rotated logs with gzip (zeek_rotate_stamp.sh re-compresses to zstd)
CompressLogs = 1
CompressCmd = gzip

# Send rotation notice to syslog only (no email)
MailTo =
SendMail =

# Crash settings
CrashesDir = /forensics/zeek/crashes
StatsDir = /forensics/zeek/stats

# Standalone mode (single sensor, no cluster)
[manager]
type=manager
host=localhost

[logger]
type=logger
host=localhost

[proxy]
type=proxy
host=localhost

[worker-1]
type=worker
host=localhost
interface=ens3
