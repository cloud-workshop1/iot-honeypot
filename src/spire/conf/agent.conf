# agent.conf
# Deploy to: /opt/spire/conf/agent.conf
#
# Fix from Plan.pdf: trust_domain standardized to "iot-honeypot.local"
# Docker WorkloadAttestor: issues SVIDs based on container image digest.

agent {
  data_dir        = "/opt/spire/data/agent"
  log_level       = "INFO"
  server_address  = "127.0.0.1"
  server_port     = "8081"
  socket_path     = "/opt/spire/sockets/agent.sock"
  trust_domain    = "iot-honeypot.local"
  insecure_bootstrap = true
}

plugins {
  NodeAttestor "join_token" {
    plugin_data {}
  }

  WorkloadAttestor "docker" {
    plugin_data {
      docker_socket_path = "unix:///var/run/docker.sock"
    }
  }

  WorkloadAttestor "unix" {
    plugin_data {}
  }

  KeyManager "disk" {
    plugin_data {
      directory = "/opt/spire/data/agent"
    }
  }
}
